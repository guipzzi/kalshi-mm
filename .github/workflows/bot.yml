name: mm

on:
  schedule:
    - cron: "23 */6 * * *"       # 00:23, 06:23, 12:23, 18:23 UTC — fora da hora cheia (mais confiável)
  workflow_dispatch:
    inputs:
      mode:
        description: "status | dry | live | flatten"
        default: "status"
      qty:
        description: "contracts per order (live)"
        default: "1"
      max_usd:
        description: "total exposure cap $ (live)"
        default: "5"
      minutes:
        description: "loop duration in minutes (live)"
        default: "60"

concurrency:
  group: mm
  cancel-in-progress: false

jobs:
  mm:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - name: write key
        env:
          K: ${{ secrets.KALSHI_PRIVATE_KEY }}
        run: |
          printf '%s\n' "$K" > kalshi_key.pem
          chmod 600 kalshi_key.pem
      - name: run
        env:
          KALSHI_API_KEY_ID: ${{ secrets.KALSHI_API_KEY_ID }}
          KALSHI_PRIVATE_KEY_PATH: kalshi_key.pem
          MM_SERIES: ${{ secrets.MM_SERIES }}
          MM_QTY: ${{ github.event.inputs.qty || '1' }}
          MM_MAX_USD: ${{ github.event.inputs.max_usd || '5' }}
          MM_SKEW: "0.3"
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            export LOOP_MAX_MINUTES=350
            LIVE=1 python -m mm.bot --live
          else
            export LOOP_MAX_MINUTES="${{ github.event.inputs.minutes || '60' }}"
            MODE="${{ github.event.inputs.mode }}"
            if [ "$MODE" = "live" ]; then LIVE=1 python -m mm.bot --live
            elif [ "$MODE" = "dry" ]; then python -m mm.bot --dry
            elif [ "$MODE" = "flatten" ]; then python -m mm.bot --flatten
            else python -m mm.bot --status; fi
          fi
